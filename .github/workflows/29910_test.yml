name: 29910 Test

on:
  push:
    branches:
      - main

jobs:
  preveri-teste:
    name: Preveri obstoj testov
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Prenesi repozitorij
        uses: actions/checkout@v4

      - name: Preveri testne skripte
        run: |
          touch napaka.txt

          if [ ! -d "tests" ]; then
            echo "Mapa tests ne obstaja!" > napaka.txt
            exit 1
          fi

          if [ ! -f "tests/test.sh" ]; then
            echo "Datoteka tests/test.sh ne obstaja!" > napaka.txt
            exit 1
          fi

          echo "Testne skripte obstajajo."

      - name: Naloži artefakt napaka.txt
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  izvedi-teste:
    name: Pripravi okolje in izvedi teste
    needs: preveri-teste
    runs-on: [self-hosted, macOS, ARM64]

    strategy:
      matrix:
        compiler: [clang++]

    steps:
      - name: Prenesi repozitorij
        uses: actions/checkout@v4

      - name: Prenesi artefakt napaka.txt
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Preveri vsebino napaka.txt
        run: |
          if [ -s napaka.txt ]; then
            echo "V prvem poslu je prišlo do napake:"
            cat napaka.txt
            exit 1
          fi

          echo "napaka.txt je prazen, nadaljujem s testi."

      - name: Preveri C++ prevajalnik
        run: |
          clang++ --version

      - name: Zaženi teste
        run: |
          chmod +x tests/test.sh
          CXX=${{ matrix.compiler }} ./tests/test.sh
