name: 29910 Deploy

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  REPONAME: vaja5

on:
  workflow_run:
    workflows:
      - 29910 Test
    types:
      - completed

jobs:
  deploy:
    name: Zgradi in objavi Docker image
    runs-on: [self-hosted, linux]

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Prenesi repozitorij
        uses: actions/checkout@v4

      - name: Ustvari datum za tag
        id: datum
        run: echo "date=$(date +'%Y-%m-%d--%M-%S')" >> "$GITHUB_ENV"

      - name: Potisni na DockerHub z akcijo
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
          registry: docker.io
          dockerfile: Dockerfile
          tags: latest,${{ env.date }}
          image: ${{ env.DOCKER_USERNAME }}/${{ env.REPONAME }}
