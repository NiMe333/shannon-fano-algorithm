name: 29910 Deploy

on:
  workflow_run:
    workflows:
      - 29910 Test
    types:
      - completed

jobs:
  deploy:
    name: Zgradi Docker sliko in jo objavi na DockerHub
    runs-on: [self-hosted, linux]

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Prenesi repozitorij
        uses: actions/checkout@v4

      - name: Prijava v DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Zgradi Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vaja5:latest .

      - name: Objavi Docker image na DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vaja5:latest
