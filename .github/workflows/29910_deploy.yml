name: 29910 Deploy

# Ta workflow se sproži, ko se workflow 29910 Test konča
on:
  workflow_run:
    workflows:
      - 29910 Test
    types:
      - completed

jobs:
  deploy:
    name: Zgradi Docker sliko in jo objavi na DockerHub
    runs-on: [self-hosted, linux]

    # Deploy se izvede samo, če je bil testni workflow uspešen
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Prenesemo kodo iz repozitorija
      - name: Prenesi repozitorij
        uses: actions/checkout@v4

      # Prijava v DockerHub z GitHub Secrets
      - name: Prijava v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Priprava Docker Buildx okolja
      - name: Pripravi Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Zgradimo Docker image in ga potisnemo na DockerHub
      - name: Zgradi in objavi Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vaja5:latest
